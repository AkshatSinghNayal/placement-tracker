# nginx config for the Placement Tracker SPA.
# Served at port 80. /api/* is reverse-proxied to the backend.
# BACKEND_URL is injected at container start via envsubst.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing — any path not matching a real file falls back
    # to index.html so React Router handles it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to the backend.
    # When running via docker-compose the backend is reachable at http://backend:8000.
    # Set BACKEND_URL=http://backend:8000 in docker-compose or the container env.
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required for httpOnly cookies on cross-origin requests.
        proxy_cookie_flags ~ secure samesite=none;
    }

    # Security headers.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively; HTML never cached (SPA update safety).
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
