name: Backend CI
# Verified in Phase 11 — lint + migrations + /health smoke test all pass.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: placement
          POSTGRES_PASSWORD: placement
          POSTGRES_DB: placement_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U placement -d placement_tracker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://placement:placement@localhost:5432/placement_tracker
      JWT_SECRET_KEY: ci-only-not-secret
      JWT_REFRESH_SECRET_KEY: ci-only-not-secret
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      CLOUDINARY_CLOUD_NAME: ""
      CLOUDINARY_API_KEY: ""
      CLOUDINARY_API_SECRET: ""
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:8000
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Lint (ruff)
        run: ruff check app

      - name: Apply migrations
        run: alembic upgrade head

      - name: Smoke-test /health
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!
          sleep 3
          curl -fsS http://127.0.0.1:8000/api/v1/health | grep -q '"status":"ok"'
          kill $SERVER_PID

      # Tests directory is empty in Phase 1; pytest discovers nothing and
      # exits 5 (no tests collected). We tolerate that exit code so CI is
      # green until real tests land in Phase 2+.
      - name: Run tests
        run: pytest -q || [ $? -eq 5 ]
